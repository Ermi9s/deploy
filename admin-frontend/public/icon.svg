<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="180" height="180" rx="37"/>
    </clipPath>
  </defs>
  <rect width="180" height="180" rx="37" fill="url(#bg)"/>
  <!-- Geometric brain icon (left hemisphere) -->
  <g clip-path="url(#round)" stroke="white" stroke-width="3.5" stroke-linejoin="round" fill="none">
    <!-- Left hemisphere -->
    <polyline points="90,42 70,55 55,68 50,88 55,108 68,122 82,130 90,128"/>
    <line x1="90" y1="42" x2="70" y2="55"/>
    <line x1="70" y1="55" x2="58" y2="75"/>
    <line x1="58" y1="75" x2="50" y2="88"/>
    <line x1="50" y1="88" x2="55" y2="108"/>
    <line x1="55" y1="108" x2="68" y2="122"/>
    <line x1="68" y1="122" x2="82" y2="130"/>
    <line x1="82" y1="130" x2="90" y2="128"/>
    <!-- Left internal lines -->
    <line x1="70" y1="55" x2="75" y2="80"/>
    <line x1="75" y1="80" x2="58" y2="75"/>
    <line x1="75" y1="80" x2="68" y2="100"/>
    <line x1="68" y1="100" x2="50" y2="88"/>
    <line x1="68" y1="100" x2="55" y2="108"/>
    <line x1="68" y1="100" x2="82" y2="112"/>
    <line x1="82" y1="112" x2="68" y2="122"/>
    <line x1="82" y1="112" x2="82" y2="130"/>
    <line x1="82" y1="112" x2="90" y2="100"/>
    <line x1="90" y1="100" x2="90" y2="128"/>
    <line x1="90" y1="68" x2="75" y2="80"/>
    <line x1="90" y1="68" x2="90" y2="42"/>
    <line x1="90" y1="68" x2="90" y2="100"/>
    <!-- Right hemisphere -->
    <polyline points="90,42 110,55 125,68 130,88 125,108 112,122 98,130 90,128"/>
    <line x1="110" y1="55" x2="105" y2="80"/>
    <line x1="105" y1="80" x2="122" y2="75"/>
    <line x1="105" y1="80" x2="112" y2="100"/>
    <line x1="112" y1="100" x2="130" y2="88"/>
    <line x1="112" y1="100" x2="125" y2="108"/>
    <line x1="112" y1="100" x2="98" y2="112"/>
    <line x1="98" y1="112" x2="112" y2="122"/>
    <line x1="98" y1="112" x2="98" y2="130"/>
    <line x1="98" y1="112" x2="90" y2="100"/>
    <line x1="90" y1="68" x2="105" y2="80"/>
    <!-- Center divide -->
    <line x1="90" y1="42" x2="90" y2="128"/>
  </g>
</svg>