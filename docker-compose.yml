services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ./management/.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    env_file:
      - ./elasticsearch/.env
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:9200/_cluster/health || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  management:
    build:
      context: ./management
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ./management/.env
    volumes:
      - ./management:/app
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/api/schema/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    env_file:
      - ./ingestion/.env
    volumes:
      - ./ingestion:/app
      - shared_uploads:/shared/uploads
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      management:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/api/schema/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    env_file:
      - ./notification/.env
    volumes:
      - ./notification:/app
    ports:
      - "8003:8000"
    depends_on:
      management:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/admin/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  rag:
    build:
      context: ./rag
      dockerfile: Dockerfile
    env_file:
      - ./rag/.env
    volumes:
      - ./rag:/app
    ports:
      - "8004:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      management:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/api/schema/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_MANAGEMENT_API=http://localhost:8002
      - NEXT_PUBLIC_INGESTION_API=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      management:
        condition: service_healthy
      ingestion:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    command: celery -A workers worker --loglevel=info --queues=document_ingestion_jobs,default
    env_file:
      - ./workers/.env
    volumes:
      - ./workers:/app
      - shared_uploads:/shared/uploads
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      management:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  esdata:
  shared_uploads:
  pgdata:
  minio-data: