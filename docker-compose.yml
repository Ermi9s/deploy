services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ./management/.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    env_file:
      - ./elasticsearch/.env
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    env_file:
      - ./ingestion/.env
    volumes:
      - ./ingestion:/app
      - shared_uploads:/shared/uploads
    ports:
      - "8001:8000"
    depends_on:
      - redis
      - postgres

  management:
    build:
      context: ./management
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ./management/.env
    volumes:
      - ./management:/app
    ports:
      - "8002:8000"
    depends_on:
      - minio

  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    env_file:
      - ./notification/.env
    volumes:
      - ./notification:/app
    ports:
      - "8003:8000"

  rag:
    build:
      context: ./rag
      dockerfile: Dockerfile
    env_file:
      - ./rag/.env
    volumes:
      - ./rag:/app
    ports:
      - "8004:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_MANAGEMENT_API=http://localhost:8002
      - NEXT_PUBLIC_INGESTION_API=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - management
      - ingestion

  workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    command: celery -A workers worker --loglevel=info --queues=document_ingestion_jobs,default
    env_file:
      - ./workers/.env
    volumes:
      - ./workers:/app
      - shared_uploads:/shared/uploads
    depends_on:
      - redis
      - elasticsearch

volumes:
  esdata:
  shared_uploads:
  pgdata:
  minio-data:
