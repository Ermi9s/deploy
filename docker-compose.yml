services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-okm_db}
      - POSTGRES_USER=${POSTGRES_USER:-okm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-okm_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WORKERS_INGEST_TASK_NAME=workers.handle_document_ingestion_job
      - UPLOAD_ROOT=/shared/uploads/
      - DB_NAME=${POSTGRES_DB:-okm_db}
      - DB_USER=${POSTGRES_USER:-okm_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-okm_password}
      - DB_HOST=${POSTGRES_HOST:-postgres}
      - DB_PORT=${POSTGRES_PORT:-5432}
    volumes:
      - ./ingestion:/app
      - shared_uploads:/shared/uploads
    ports:
      - "8001:8000"
    depends_on:
      - redis
      - postgres

  management:
    build:
      context: ./management
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - ALLOWED_HOSTS=localhost,127.0.0.1,management
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
    volumes:
      - ./management:/app
    ports:
      - "8002:8000"

  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./notification:/app
    ports:
      - "8003:8000"

  rag:
    build:
      context: ./rag
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./rag:/app
    ports:
      - "8004:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_MANAGEMENT_API=http://localhost:8002
      - NEXT_PUBLIC_INGESTION_API=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - management
      - ingestion

  workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    command: celery -A workers worker --loglevel=info --queues=document_ingestion_jobs,default
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=workers.settings
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=documents_chunks
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - UPLOAD_ROOT=/shared/uploads
    volumes:
      - ./workers:/app
      - shared_uploads:/shared/uploads
    depends_on:
      - redis
      - elasticsearch

volumes:
  esdata:
  shared_uploads:
  pgdata:
